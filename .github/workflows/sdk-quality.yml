name: SDK Quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [sdk, cli]
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/${{ matrix.package }}/package-lock.json

      - name: Install shared quality tooling
        working-directory: .
        run: npm ci

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
