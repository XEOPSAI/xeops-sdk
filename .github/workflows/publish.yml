name: Publish SDK and CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        package:
          - path: packages/sdk
            name: '@xeopsai/sdk'
          - path: packages/cli
            name: '@xeopsai/cli'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.package.path }}

      - name: Run tests
        run: npm test
        working-directory: ${{ matrix.package.path }}

      - name: Build package
        run: npm run build
        working-directory: ${{ matrix.package.path }}

      - name: Resolve current package version
        id: package_version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
        working-directory: ${{ matrix.package.path }}

      - name: Resolve published package version
        id: published_version
        run: |
          PUBLISHED=$(npm view ${{ matrix.package.name }} version 2>/dev/null || true)
          NORMALIZED=$(node .github/scripts/npm_publish_guard.mjs "${{ steps.package_version.outputs.version }}" "$PUBLISHED")
          echo "publish=$NORMALIZED" >> "$GITHUB_OUTPUT"

      - name: Publish package
        if: steps.published_version.outputs.publish == 'true'
        run: npm publish --access public --provenance
        working-directory: ${{ matrix.package.path }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip publish when version already exists
        if: steps.published_version.outputs.publish == 'false'
        run: echo "Package ${{ matrix.package.name }}@${{ steps.package_version.outputs.version }} already published."
