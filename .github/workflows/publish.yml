name: Publish SDK and CLI

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - package: sdk
            npm_name: '@xeopsai/sdk'
          - package: cli
            npm_name: '@xeopsai/cli'
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package name
        run: |
          CURRENT_NAME=$(node -p "require('./package.json').name")
          if [ "$CURRENT_NAME" != "${{ matrix.npm_name }}" ]; then
            echo "Expected ${{ matrix.npm_name }} but got $CURRENT_NAME"
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
